[build]
  publish = "dist"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"

# Redirects and rewrites
[[redirects]]
  # Redirect www to non-www
  from = "https://www.holisticacupuncture.net/*"
  to = "https://holisticacupuncture.net/:splat"
  status = 301
  force = true

[[redirects]]
  # Admin area requires authentication (when implemented)
  from = "/admin/*"
  to = "/admin/:splat"
  status = 200

[[redirects]]
  # API endpoints
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  # WordPress to Astro blog post redirects (when migrating)
  # Example: from = "/2023/01/15/blog-post-title/"
  #          to = "/blog/blog-post-title"
  #          status = 301

[[redirects]]
  # WordPress category redirects
  from = "/category/:category"
  to = "/blog"
  status = 301

[[redirects]]
  # WordPress tag redirects
  from = "/tag/:tag"
  to = "/blog"
  status = 301

[[redirects]]
  # Old WordPress URLs with trailing slash
  from = "/*/"
  to = "/:splat"
  status = 301

[[redirects]]
  # Catch-all 404
  from = "/*"
  to = "/404"
  status = 404

# Headers for security and performance
# NOTE: Source of truth is virtual-velocity/public/_headers (Cloudflare Pages).
# Keep CSP and HSTS in sync across all three (_headers, netlify.toml, vercel.json).
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' https://www.googletagmanager.com https://www.google-analytics.com https://static.cloudflareinsights.com https://www.googleadservices.com https://googleads.g.doubleclick.net; worker-src blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' https://*.cloudflare.com https://imagedelivery.net data: https://www.googletagmanager.com https://*.google-analytics.com https://www.google.com https://googleads.g.doubleclick.net; connect-src 'self' https://www.google-analytics.com https://*.google-analytics.com https://analytics.google.com https://*.analytics.google.com https://www.googletagmanager.com https://www.google.com https://*.doubleclick.net https://api.resend.com https://cloudflareinsights.com; frame-src https://www.google.com; base-uri 'self'; form-action 'self'; frame-ancestors 'none'"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Astro DB / Astro Studio integration
[context.production.environment]
  ASTRO_STUDIO_APP_TOKEN = "${ASTRO_STUDIO_APP_TOKEN}"

# Plugin for Astro
[[plugins]]
  package = "@netlify/plugin-astro"

# Forms configuration
[forms]
  # All forms go to Netlify Forms by default
